<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solana Top Traders Wallets & Tokens</title>
  <link rel="stylesheet" href="app.css?v=2" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Top Traders Wallets & Tokens</h1>
      <p class="subtitle">Solana top traders discovery via token or wallet search with Vybe API</p>
    </header>

    <section class="inputs">
      <div class="field">
        <label for="mint" id="searchInputLabel">Token mint address</label>
        <input type="text" id="mint" placeholder="e.g. DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" value="DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263" />
      </div>
      <div class="field">
        <label>Top traders search mode</label>
        <div class="trades-fetch-control">
          <button type="button" class="trades-fetch-lock" id="searchModeLock" title="Lock current mode selection" aria-pressed="true" aria-label="Lock mode switch">
            <svg class="trades-fetch-lock-icon trades-fetch-lock-icon--locked" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <svg class="trades-fetch-lock-icon trades-fetch-lock-icon--unlocked" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"/><path d="M7 11V7a5 5 0 0 1 5.5-5 5 5 0 0 1 4.5 3"/></svg>
          </button>
          <label class="trades-fetch-switch" id="searchModeSwitchLabel" title="Token or Wallet search mode">
            <input type="checkbox" id="searchModeWallet" class="trades-fetch-switch-input" />
            <span class="trades-fetch-switch-track">
              <span class="trades-fetch-switch-option" data-value="single">Token</span>
              <span class="trades-fetch-switch-option" data-value="paged">Wallet</span>
            </span>
          </label>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="fetchAll">Load token analytics</button>
        <div class="loading" id="loadingIndicator" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
      </div>
    </section>

    <section class="token-section panel" id="tokenSection">
      <div class="section-header">
        <h2>Token stats & metadata</h2>
        <div class="section-loading" id="tokenSectionLoading" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
        <span class="section-error" id="tokenSectionError" hidden aria-hidden="true"></span>
      </div>
      <div class="token-section-content" id="tokenSectionContent">
        <div class="token-header">
          <img id="tokenLogo" alt="" class="token-logo" style="display:none" />
          <div>
            <span id="tokenSymbol" class="symbol">—</span>
            <span id="tokenName" class="name">—</span>
          </div>
        </div>
        <div class="token-stats-groups" id="tokenStats"></div>
      </div>
    </section>

    <section class="top-traders-section panel" id="topTradersSection">
      <div class="section-header">
        <h2>Top traders (by realized PnL, 30d)</h2>
        <div class="section-loading" id="topTradersLoading" hidden aria-hidden="true">
          <span class="loading-spinner"></span>
          <span class="loading-text">Loading…</span>
        </div>
        <span class="section-error" id="topTradersError" hidden aria-hidden="true"></span>
      </div>
      <div class="top-traders-content" id="topTradersContentWrap">
        <p class="meta" id="topTradersMeta">—</p>
        <div class="table-wrap">
          <table id="topTradersTable">
            <thead>
              <tr>
                <th style="text-align: left">#</th>
                <th style="text-align: left">Account</th>
                <th style="text-align: left">Realized PnL (USD)</th>
                <th style="text-align: right">Trades</th>
                <th style="text-align: right">Volume (USD)</th>
                <th style="text-align: right">Win rate</th>
              </tr>
            </thead>
            <tbody id="topTradersBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="error panel" id="errorSection" hidden>
      <h2>Error</h2>
      <pre id="errorText"></pre>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
